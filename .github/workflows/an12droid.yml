name: 1Android APK Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        # Disabling Java cache to avoid GitHub server outage
        cache: ''

    - name: Set up Modern Gradle 8.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'
        # Disabling Gradle cache to bypass the broken cache servers
        cache-disabled: true

    - name: Locate Project Root and Generate Wrapper
      run: |
        GRADLE_DIR=$(find . -name "build.gradle*" | grep -v "app/build.gradle" | head -n 1)
        if [ -z "$GRADLE_DIR" ]; then
          GRADLE_DIR=$(find . -name "build.gradle*" | head -n 1)
        fi
        PROJECT_ROOT=$(dirname "$GRADLE_DIR")
        echo "Project root found at: $PROJECT_ROOT"
        cd "$PROJECT_ROOT"
        
        gradle wrapper
        chmod +x gradlew
        echo "TARGET_DIR=$PROJECT_ROOT" >> $GITHUB_ENV

    - name: Build Debug APK
      run: |
        cd ${{ env.TARGET_DIR }}
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyGeminiApp-APK
        path: "**/build/outputs/apk/debug/app-debug.apk"
