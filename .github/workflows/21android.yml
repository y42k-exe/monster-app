name: Android A12PK Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Modern Gradle 8.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'

    - name: Locate Project Root and Generate Wrapper
      run: |
        # Locate the directory containing your build settings file
        GRADLE_DIR=$(find . -name "build.gradle*" | grep -v "app/build.gradle" | head -n 1)
        if [ -z "$GRADLE_DIR" ]; then
          GRADLE_DIR=$(find . -name "build.gradle*" | head -n 1)
        fi
        PROJECT_ROOT=$(dirname "$GRADLE_DIR")
        echo "Project root found at: $PROJECT_ROOT"
        cd "$PROJECT_ROOT"
        
        # Generate clean wrapper files matching our modern Gradle version
        gradle wrapper
        chmod +x gradlew
        echo "TARGET_DIR=$PROJECT_ROOT" >> $GITHUB_ENV

    - name: Build Debug APK
      run: |
        cd ${{ env.TARGET_DIR }}
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyGeminiApp-APK
        path: "**/build/outputs/apk/debug/app-debug.apk"
