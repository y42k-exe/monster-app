name: Android APK Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Find Project and Generate Missing Gradle Wrapper
      run: |
        # Find where build.gradle or build.gradle.kts lives
        GRADLE_DIR=$(find . -name "build.gradle*" | grep -v "app/build.gradle" | head -n 1)
        
        if [ -z "$GRADLE_DIR" ]; then
          # Fallback if it only finds the app module file
          GRADLE_DIR=$(find . -name "build.gradle*" | head -n 1)
        fi
        
        PROJECT_ROOT=$(dirname "$GRADLE_DIR")
        echo "Project root found at: $PROJECT_ROOT"
        cd "$PROJECT_ROOT"
        
        # Install standard gradle wrapper files so we have gradlew
        sudo apt-get update && sudo apt-get install -y gradle
        gradle wrapper
        chmod +x gradlew
        
        # Save the path for the next step
        echo "TARGET_DIR=$PROJECT_ROOT" >> $GITHUB_ENV

    - name: Build Debug APK
      run: |
        cd ${{ env.TARGET_DIR }}
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyGeminiApp-APK
        path: "**/build/outputs/apk/debug/app-debug.apk"
